        // 初始化页面
        function init() {
            renderCategories();
            renderPrompts();

        // 渲染分类列表
        function renderCategories() {
            const categories = [...new Set(prompts.map(p => p.category))];
            const categoryList = document.getElementById('categoryList');
            categoryList.innerHTML = categories.map(cat => {
                const isSelected = selectedCategory === cat;
                return `
                    <button onclick="selectCategory('${cat}')" class="w-full text-left px-3 py-2 rounded-lg text-sm transition-all duration-200 font-medium flex justify-between items-center ${
                        isSelected 
                        ? 'bg-indigo-50/80 text-indigo-700 font-semibold shadow-sm shadow-indigo-50/30' 
                        : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'
                    }">
                        <span>${cat}</span>
                        <span class="text-xs px-1.5 py-0.5 rounded-full transition-colors duration-200 ${
                            isSelected ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-500'
                        }">${
                            prompts.filter(p => p.category === cat).length
                        }</span>
                    </button>
                `;
            }).join('');
        }

        // 选择分类
        function selectCategory(cat) {
            selectedCategory = cat;
            renderCategories();
            renderPrompts();
        }

        // 渲染提示词卡片（纯只读状态）
        function renderPrompts() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const filtered = prompts.filter(p => {
                const matchesCategory = p.category === selectedCategory;
                const matchesSearch = p.title.toLowerCase().includes(searchQuery) || p.prompt.toLowerCase().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            const grid = document.getElementById('promptGrid');
            const emptyState = document.getElementById('emptyState');

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            grid.innerHTML = filtered.map(p => {
                return `
                    <div class="bg-white border border-slate-200/80 rounded-xl p-5 hover:shadow-md hover:shadow-slate-100 hover:border-slate-300/60 transition-all duration-300 flex flex-col justify-between group">
                        <div>
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-[11px] font-semibold bg-indigo-50 text-indigo-700 px-2.5 py-0.5 rounded-full">${p.category}</span>
                            </div>
                            <h4 class="font-bold text-slate-800 text-base mb-2 group-hover:text-indigo-600 transition-colors">${p.title}</h4>
                            <div class="text-slate-600 text-sm whitespace-pre-wrap break-words h-52 overflow-y-auto bg-slate-50/80 p-3.5 rounded-lg border border-slate-100/80 font-mono mb-4 custom-scrollbar">${escapeHtml(p.prompt)}</div>
                        </div>

                            <i class="fa-regular fa-copy text-xs"></i> 复制提示词
                        </button>
                    </div>
                `;
            }).join('');

        // 搜索过滤
        function filterPrompts() {
            renderPrompts();
        }

        // 复制到剪贴板功能
        function copyToClipboard(button, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalContent = button.innerHTML;
                button.innerHTML = `<i class="fa-solid fa-check"></i> 已复制`;
                button.classList.add('bg-emerald-600', 'text-white');
                button.classList.remove('bg-slate-100', 'text-slate-700', 'hover:bg-indigo-600');
                
                showToast("提示词已成功复制到剪切板");

                setTimeout(() => {
                    button.innerHTML = originalContent;
                    button.classList.remove('bg-emerald-600');
                    button.classList.add('bg-slate-100', 'text-slate-700', 'hover:bg-indigo-600');
                }, 1500);
            }).catch(err => {
                showToast("复制失败，请手动选择复制", true);
            });
        }

        // 显示 Toast 提示
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMessage');
            
            msgEl.innerText = message;
            if (isError) {
                toast.classList.add('bg-rose-600');
                toast.classList.remove('bg-slate-900');
            } else {
                toast.classList.remove('bg-rose-600');
                toast.classList.add('bg-slate-900');
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 2500);
        }

        // 工具函数：转义 HTML 实体
        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // 工具函数：转义 JS 字符串以放入模板字符串中
        function escapeJsString(str) {
            return str.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');
        }
