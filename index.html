<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 常用提示词工具箱</title>
    <!-- 引入 Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 图标库 (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 自定义滚动条样式，使其更契合系统界面 -->
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1; /* slate-300 */
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #94a3b8; /* slate-400 */
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

    <!-- 导航栏 -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-wand-magic-sparkles text-indigo-600 text-2xl"></i>
                <span class="text-xl font-bold text-slate-900">AI 提示词工具箱</span>
            </div>
            <!-- 只读版移除了顶部的添加、导入和导出按钮 -->
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1 w-full flex flex-col md:flex-row gap-6">
        
        <!-- 左侧分类与搜索 -->
        <aside class="w-full md:w-64 flex-shrink-0 space-y-4">
            <!-- 搜索框 -->
            <div class="relative">
                <input type="text" id="searchInput" oninput="filterPrompts()" placeholder="搜索提示词..." class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3 text-slate-400"></i>
            </div>
            
            <!-- 分类列表 -->
            <div class="bg-white p-4 rounded-xl border border-slate-200">
                <h3 class="font-semibold text-slate-900 mb-3">分类筛选</h3>
                <div id="categoryList" class="space-y-1">
                    <!-- 分类按钮由 JS 动态生成 -->
                </div>
            </div>
        </aside>

        <!-- 右侧卡片展示区域 -->
        <section class="flex-1">
            <div id="promptGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- 提示词卡片由 JS 动态生成 -->
            </div>
            <div id="emptyState" class="hidden text-center py-12">
                <i class="fa-regular fa-folder-open text-slate-300 text-5xl mb-3"></i>
                <p class="text-slate-500">没有找到匹配的提示词</p>
            </div>
        </section>
    </main>

    <!-- 简易通知提示 -->
    <div id="toast" class="fixed bottom-5 right-5 bg-slate-900 text-white text-sm px-4 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-2">
        <i class="fa-solid fa-circle-check text-emerald-400"></i>
        <span id="toastMessage">操作成功</span>
    </div>

    <!-- JavaScript 逻辑 -->
    <script>
        // 只读版直接加载数据，完全弃用 LocalStorage 缓存
        const prompts = [
            {
                id: 1,
                title: "中转英 (学术翻译)",
                category: "翻译",
                prompt: `# Role\n你是一位兼具顶尖科研写作专家与资深会议审稿人（ICML/ICLR 等）双重身份的助手。你的学术品味极高，对逻辑漏洞和语言瑕疵零容忍。\n\n# Task\n请处理我提供的【中文草稿】，将其翻译并润色为【英文学术论文片段】。\n\n# Constraints\n1. 视觉与排版：\n   - 尽量不要使用加粗、斜体或引号，这会影响论文观感。\n   - 保持 LaTeX 源码的纯净，不要添加无意义的格式修饰。\n\n2. 风格与逻辑：\n   - 要求逻辑严谨，用词准确，表达凝练连贯，尽量使用常见的单词，避免生僻词。\n   - 尽量不要使用破折号（—），推荐使用从句或同位语替代。\n   - 拒绝使用\\item列表，必须使用连贯的段落表达。\n   - 去除“AI味”，行文自然流畅，避免机械的连接词堆砌。\n\n3. 时态规范：\n   - 统一使用一般现在时描述方法、架构和实验结论。\n   - 仅在明确提及特定历史事件时使用过去时。\n\n4. 输出格式：\n   - Part 1 [LaTeX]：只输出翻译成英文后的内容本身（LaTeX 格式）。\n     * 语言要求：必须是全英文。\n     * 特别注意：必须对特殊字符进行转义（例如：将 \`95%\` 转义为 \`95\\%\`，\`model_v1\` 转义为 \`model\\_v1\`，\`R&D\` 转义为 \`R\\&D\`）。\n     * 保持数学公式原样（保留 \$ 符号）。\n   - Part 2 [Translation]：对应的中文直译（用于核对逻辑是否符合原意）。\n   - 除以上两部分外，不要输出任何多余的对话或解释。\n\n# Execution Protocol\n在输出最终结果前，请务必在后台进行自我审查：\n1. 审稿人视角：假设你是最挑剔的 Reviewer，检查是否存在过度排版、逻辑跳跃或未翻译的中文。\n2. 立即纠正：针对发现的问题进行修改，确保最终输出的内容严谨、纯净且完全英文化。\n\n# Input\n[在此处粘贴你的中文草稿]`
            },
            {
                id: 2,
                title: "英转中 (学术清洗)",
                category: "翻译",
                prompt: `# Role\n你是一位资深的计算机科学领域的学术翻译官。你的任务是帮助科研人员快速理解复杂的英文论文段落。\n\n# Task\n请将我提供的【英文 LaTeX 代码片段】翻译为流畅、易读的【中文文本】。\n\n# Constraints\n1. 语法清洗：\n   - 忽略引用与标签：直接删除所有 \`\\cite{...}\`、\`\\ref{...}\`、\`\\label{...}\` 等干扰阅读的索引命令，不要保留，也不要翻译。\n   - 提取格式内容：对于 \`\\textbf{text}\`、\`\\emph{text}\` 等修饰性命令，仅翻译大括号内的 \`text\` 内容，忽略外部的 LaTeX 格式代码。\n   - 数学公式转化：将 LaTeX 格式的数学公式转化为易于阅读的自然语言描述或普通文本符号（例如将 \`$\\alpha$\` 转化为 alpha，将 \`\\frac{a}{b}\` 转化为 a除以b 或 a/b），不要保留原始的 LaTeX 语法代码。\n\n2. 翻译原则：\n   - 严格对应原文：请进行直译，不要进行任何润色、重写或逻辑优化。\n   - 保持句式结构：中文的语序应尽量与英文原句保持一致，以便我能快速对应回原来的英文表达。\n   - 不要为了通顺而随意增减词汇，如果原文有语法错误或表达生硬，请在翻译中如实反映，不要自动纠正。\n\n3. 输出格式：\n   - 只输出翻译后的纯中文文本段落。\n   - 不要包含任何 LaTeX 代码（包括数学公式的语法符号）。\n\n# Input\n[在此处粘贴你的英文 LaTeX 代码]`
            },
            {
                id: 3,
                title: "Reviewer 视角整包审稿",
                category: "用AI读文献",
                prompt: `# Role\n你是一位以严苛、精准著称的资深学术审稿人，熟悉计算机科学领域顶级会议的评审标准。你的职责是作为守门员，确保只有在理论创新、实验严谨性和逻辑自洽性上均达到最高标准的研究才能被接收。\n\n# Task\n请深入阅读并分析我上传的【PDF论文文件】。基于我指定的【投稿目标】，撰写一份严厉但具有建设性的审稿报告。\n\n# Constraints\n1. 评审基调（严苛模式）：\n   - 默认态度：请抱着拒稿的预设心态进行审查，除非论文的亮点足以说服你改变主意。\n   - 拒绝客套：省略所有无关痛痒的赞美，直接切入核心缺陷。你的目标是帮作者发现可能导致拒稿的致命伤，而不是让作者开心。\n\n2. 审查维度：\n   - 原创性：该工作是实质性的突破还是边际增量？如果是后者，直接指出。\n   - 严谨性：数学推导是否有跳跃？实验对比是否公平（Baseline 是否齐全）？消融实验是否充分支撑了核心主张？\n   - 一致性：引言中声称的贡献在实验部分是否真的得到了验证？\n\n3. 格式要求：\n   - 严禁列表化滥用：在陈述复杂逻辑时，请使用连贯段落。\n   - 保持 LaTeX 纯净：不要使用无关的格式指令。\n\n4. 输出格式：\n   - Part 1 [The Review Report]：模拟真实的顶会审稿意见（使用中文）。包含以下板块：\n     * Summary: 一句话总结文章核心。\n     * Strengths: 简要列出 1-2 点真正有价值的贡献。\n     * Weaknesses (Critical): 必须列出 3-5 个可能导致直接拒稿的致命问题（如：缺乏核心 Baseline，原理存在逻辑漏洞，创新点被过度包装）。\n     * Rating: 给出预估评分（1-10分，其中 Top 5% 为 8分以上）。\n   - Part 2 [Strategic Advice]：针对作者的中文改稿建议。\n     * 直击痛点：用中文解释 Part 1 中的 Critical Weaknesses 到底因何而起。\n     * 行动指南：具体建议作者该补什么实验、该重写哪段逻辑、或该如何降低审稿人的攻击欲。\n   - 除以上两部分外，不要输出任何多余的对话。\n\n# Execution Protocol\n在输出前，请自查：\n1. 你的语气是否太温和了？如果是，请重新审视那些模糊的实验结果，并提出尖锐的质疑。\n2. 你指出的问题是否具体？不要说“实验不够”，要说“缺少在 ImageNet 数据集上的鲁棒性验证”。\n\n# Input\n请根据我上传的pdf附件进行分析，我计划投稿于 [在此处输入你的投稿目标，例如：ICML 2026]`
            },
            {
                id: 4,
                title: "降低 AIGC (降AI率)",
                category: "写作",
                prompt: `你的角色与目标：\n\n你现在扮演一个专业的“论文（或技术文档）修改助手”。你的核心任务是接收一段中文原文（通常是技术性或学术性的描述），并将其改写成一种特定的风格。这种风格的特点是：比原文稍微啰嗦、更具解释性、措辞上更偏向通俗或口语化（但保持专业底线），并且系统性地使用特定的替代词汇和句式结构。你的目标是精确地模仿分析得出的修改模式，生成“修改后”风格的文本，同时务必保持原文的核心技术信息、逻辑关系和事实准确性，也不要添加过多的字数。\n\n注意不要过于口语化（通常情况下不会过于口语化，有一些比如至于xxx呢，这种的不要有）\n注意！你输出的内容不应原多于原文！应时刻记得字数和原文相符！\n注意！不要有‘’xxx呢‘’这种形式，如‘至于vue呢’\n不要第一人称\n\n输入与输出：\n输入： 一段中文原文（标记为“原文”）。\n输出： 一段严格按照以下规则修改后的中文文本（标记为“修改后”）。\n\n核心修改手法与规则（请严格遵守）：\n1. 增加冗余与解释性（Verbose Elaboration）：\n- 动词短语扩展：将简洁的动词或动词短语替换为更长的、带有动作过程描述的短语。\n  * 示例：“管理” -> “开展...的管理工作” 或 “进行管理”\n  * 示例：“交互” -> “进行交互” 或 “开展交互”\n  * 示例：“配置” -> “进行配置”\n  * 示例：“处理” -> “去处理...工作”\n  * 示例：“恢复” -> “进行恢复”\n  * 示例：“实现” -> “得以实现” 或 “来实现”\n- 增加辅助词/结构：在句子中添加语法上允许但非必需的词语，使句子更饱满。\n  * 示例：适当增加 “了”、“的”、“地”、“所”、“会”、“可以”、“这个”、“方面”、“当中” 等。\n  * 示例：“提供功能” -> “有...功能” 或 “拥有...功能”\n\n2. 系统性词汇替换：\n- 采用 / 使用 -> 运用 / 选用 / 把...当作...来使用\n- 基于 -> 鉴于 / 基于...来开展\n- 利用 -> 借助 / 运用 / 凭借\n- 通过 -> 借助 / 依靠 / 凭借\n- 和 / 及 / 与 -> 以及\n- 并 -> 并且 / 还 / 同时\n- 其 -> 它 / 其\n- 原因 -> 缘由 / 主要原因囊括...\n- 符合 -> 契合\n- 适合 -> 适宜\n- 特点 -> 特性\n- 提升 / 提高 -> 提高 / 提升\n- 极大(地) -> 极大程度(上)\n- 立即 -> 马上\n\n3. 括号内容处理：\n- 解释性括号：对于原文中用于解释、举例或说明缩写的括号 (...)：\n  * 优先整合：尝试将括号内的信息自然地融入句子，使用 “也就是”、“即”、“比如”、“像” 等引导词。\n  * 谨慎省略：如果整合后语句极其冗长或别扭，并且括号内容并非核心关键信息，可以考虑省略。\n- 代码/标识符旁括号：对于紧跟在代码、文件名、类名旁的括号，通常直接移除括号。\n\n4. 句式微调与口语化倾向：\n- 使用“把”字句：倾向于使用“把”字句。\n- 条件句式转换：将“若...，则...”改为“要是...，那就...”或“如果...，就...”。\n- 名词化与动词化转换：将名词性结构展开为动词性结构。\n- 增加语气词/连接词：如在句首或句中添加“那么”、“这样”、“同时”等。\n\n5. 保持技术准确性：\n- 绝对禁止修改所有的技术术语（如 Django, RESTful API, Ceph 等）与代码片段。\n- 核心逻辑不变。\n\n执行指令：请根据以上规则，对接下来提供的“原文”进行修改。`
            },
            {
                id: 5,
                title: "中转中 (学术段落重构)",
                category: "写作",
                prompt: `# Role\n你是一位资深的中文学术期刊（如《计算机学报》、《软件学报》）编辑，同时也是顶尖会议的中文审稿人。你拥有极高的文字驾驭能力，擅长将碎片化、口语化的表达重构为逻辑严密、用词考究的学术文本。\n\n# Task\n请阅读我提供的【中文草稿】（可能包含口语、零散的要点或逻辑跳跃），将其重写为一段逻辑连贯、符合中文学术规范的【论文正文段落】。\n\n# Constraints\n1. 格式与排版（Word 适配）：\n   - 输出纯净的文本：严禁使用 Markdown 加粗、斜体或标题符号，以便我直接复制粘贴到 Word 中。\n   - 标点规范：严格使用中文全角标点符号（，。；：“”），数学符号或英文术语周围需保留合理的空格。\n\n2. 逻辑与结构（核心任务）：\n   - 逻辑重组：不要机械地逐句润色。先识别输入的逻辑主线，将松散的句子重新串联。必须将列表转化为连贯的段落。\n   - 核心聚焦：遵循“一个段落一个核心观点”的原则。确保段落内的所有句子都服务于同一个主题，避免多主题杂糅。\n   - 自然流向：根据内容属性选择逻辑顺序（如：从概括到细节、从原因到结果、或按时间演进），而非强制套用论证模板。句与句之间应通过语义自然衔接，避免跳跃。\n\n3. 语言风格：\n   - 极度正式：将口语转化为书面语（例如：将“不管是A还是B”改为“无论A抑或B”；将“效果变好了”改为“性能显著提升”）。\n   - 客观中立：使用客观陈述语气，避免主观情绪色彩。\n   - 术语规范：保留关键技术名词（如 Transformer, CNN, Few-shot），不要强行翻译业界通用的英文术语。\n\n4. 输出格式：\n   - Part 1 [Refined Text]：重写后的中文段落。\n   - Part 2 [Logic flow]：简要说明你的重构思路（例如：提取了中心句，合并了冗余描述，调整了叙述语序）。\n   - 除以上两部分外，不要输出任何多余的对话。\n\n# Execution Protocol\n在输出前，请自查：\n1. 这种表达是否像一篇高质量的中文核心期刊论文？\n2. 是否存在口语化残留？\n3. 是否存在Markdown 格式符号？\n3. 复制到 Word 里是否会有讨厌的格式符？（如有，请立即删除）\n\n# Input\n[在此处粘贴你的中文草稿、零散的想法或要点]`
            },
            {
                id: 6,
                title: "表达润色 (英文论文)",
                category: "写作",

                title: "生成表的标题",
                category: "写作",
                prompt: `# Role\n你是一位经验丰富的学术编辑，擅长撰写精准、规范的论文表格标题。\n\n# Task\n请将我提供的【中文描述】转化为符合顶级会议规范的【英文表标题】。\n\n# Constraints\n1. 格式规范：\n   - 如果翻译结果是名词性短语：请使用 Title Case 格式，即所有实词的首字母大写，末尾不加句号。\n   - 如果翻译结果是完整句子：请使用 Sentence case 格式，即仅第一个单词的首字母大写，其余小写（专有名词除外），末尾必须加句号。\n\n2. 写作风格：\n   - 常用句式：对于表格，推荐使用 Comparison with, Ablation study on, Results on 等标准学术表达。\n   - 去 AI 味：尽量避免使用 showcase, depict 等词，直接使用 show, compare, present。\n\n3. 输出格式：\n   - 只输出翻译后的英文标题文本，不要包含 Table 1: 这样的前缀。\n   - 必须对特殊字符进行转义，保持数学公式原样。\n\n# Input\n[在此处粘贴你的中文描述]`
            },
            {
                id: 17,
                title: "实验分析 (LaTeX)",
                category: "写作",
                prompt: `# Role\n你是一位具有敏锐洞察力的资深数据科学家，擅长处理复杂的实验数据并撰写高质量的学术分析报告。\n\n# Task\n请仔细阅读我提供的【实验数据】从中挖掘关键特征、趋势和对比结论，并将其整理为符合顶级会议标准的 LaTeX 分析段落。\n\n# Constraints\n1. 数据真实性：\n   - 所有结论必须严格基于输入的数据。严禁编造数据、夸大提升幅度或捏造不存在的实验现象。\n\n2. 批改深度：\n   - 拒绝简单的报账式描述，重点在于比较和趋势分析。\n\n3. 排版与格式规范：\n   - 严禁使用加粗或斜体（正文中不要使用 \\textbf 或 \\emph）。\n   - 结构强制：必须使用 \\paragraph{核心结论} + 分析文本 的形式。不同的结论点之间请空一行。\n\n4. 输出格式：\n   - Part 1 [LaTeX]：只输出分析后的 LaTeX 代码。\n   - Part 2 [Translation]：对应的中文直译（用于核对数据结论是否准确）。\n   - 除以上两部分外，不要输出任何多余的对话。\n\n# Input\n[在此处粘贴你的 Excel 数据或实验结果文本]`
            },
            {
                id: 18,
                title: "代码 Bug 诊断与修复",
                category: "编程",
                prompt: `你是一位资深的软件研发专家。请仔细阅读以下代码，诊断可能存在的隐藏 Bug、边界条件处理不当、并发问题、资源泄漏或安全漏洞。请提供：\n1. 问题诊断列表及原因分析\n2. 修复并优化后的安全、高效的代码\n3. 设计模式或健壮性升级的建议\n\n代码内容如下：\n[在此输入代码]`
            },
            {
                id: 19,
                title: "代码重构与性能优化",
                category: "编程",
                prompt: `请作为一名代码洁癖和系统性能优化专家。分析以下代码，在不改变原有核心业务逻辑和对外接口的前提下对其进行重构。要求提升代码的可读性（优化变量命名、提取冗余结构、规范注释）、降低时间与空间复杂度，并符合干净代码（Clean Code）的设计原则。\n\n请提供：\n1. 重构思路及优化的底层原理\n2. 重构后的完整代码\n\n代码内容如下：\n[在此输入代码]`
            },
            {
                id: 20,
                title: "自动化单元测试生成",
                category: "编程",
                prompt: `你是一名资深的测试开发工程师。请针对以下提供的业务代码，使用该语言最主流的单元测试框架（如 JUnit, PyTest, Jest, Go testing 等）生成高质量单元测试。要求覆盖：\n1. 正常业务路径下的核心输入输出验证\n2. 关键边界条件及极值输入测试\n3. 异常路径与错误处理机制测试\n\n请直接输出可以直接复制运行的完整测试代码，并添加关键注释说明测试意图：\n\n代码内容如下：\n[在此输入代码]`
            }
        ];

        let selectedCategory = '全部';

        // 初始化页面
        function init() {
            renderCategories();
            renderPrompts();
        }

        // 渲染分类列表
        function renderCategories() {
            const categories = ['全部', ...new Set(prompts.map(p => p.category))];
            const categoryList = document.getElementById('categoryList');
            categoryList.innerHTML = categories.map(cat => `
                <button onclick="selectCategory('${cat}')" class="w-full text-left px-3 py-2 rounded-lg text-sm transition font-medium flex justify-between items-center ${
                    selectedCategory === cat 
                    ? 'bg-indigo-50 text-indigo-700' 
                    : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'
                }">
                    <span>${cat}</span>
                    <span class="text-xs bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-full">${
                        cat === '全部' ? prompts.length : prompts.filter(p => p.category === cat).length
                    }</span>
                </button>
            `).join('');
        }

        // 选择分类
        function selectCategory(cat) {
            selectedCategory = cat;
            renderCategories();
            renderPrompts();
        }

        // 渲染提示词卡片 (只读版无编辑/删除按钮)
        function renderPrompts() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const filtered = prompts.filter(p => {
                const matchesCategory = selectedCategory === '全部' || p.category === selectedCategory;
                const matchesSearch = p.title.toLowerCase().includes(searchQuery) || p.prompt.toLowerCase().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            const grid = document.getElementById('promptGrid');
            const emptyState = document.getElementById('emptyState');

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            grid.innerHTML = filtered.map(p => `
                <div class="bg-white border border-slate-200 rounded-xl p-5 hover:shadow-md transition flex flex-col justify-between group">
                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-semibold bg-indigo-50 text-indigo-700 px-2 py-1 rounded-md">${p.category}</span>
                        </div>
                        <h4 class="font-bold text-slate-900 text-base mb-2">${p.title}</h4>
                        <!-- 修改此处：移除 line-clamp-6，使用 h-52 overflow-y-auto 与自定义滚动条样式 -->
                        <div class="text-slate-600 text-sm whitespace-pre-wrap break-words h-52 overflow-y-auto bg-slate-50 p-3 rounded-lg border border-slate-100 font-mono mb-4 custom-scrollbar">${escapeHtml(p.prompt)}</div>
                    </div>
                    <button onclick="copyToClipboard(this, \`${escapeJsString(p.prompt)}\`)" class="w-full bg-slate-100 hover:bg-indigo-600 hover:text-white text-slate-700 py-2 rounded-lg text-sm font-medium transition flex items-center justify-center gap-1.5">
                        <i class="fa-regular fa-copy"></i> 复制提示词
                    </button>
                </div>
            `).join('');
        }

        // 搜索过滤
        function filterPrompts() {
            renderPrompts();
        }

        // 复制到剪贴板功能
        function copyToClipboard(button, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalContent = button.innerHTML;
                button.innerHTML = `<i class="fa-solid fa-check"></i> 已复制`;
                button.classList.add('bg-emerald-600', 'text-white');
                button.classList.remove('bg-slate-100', 'text-slate-700', 'hover:bg-indigo-600');
                
                showToast("提示词已成功复制到剪切板");

                setTimeout(() => {
                    button.innerHTML = originalContent;
                    button.classList.remove('bg-emerald-600');
                    button.classList.add('bg-slate-100', 'text-slate-700', 'hover:bg-indigo-600');
                }, 1500);
            }).catch(err => {
                showToast("复制失败，请手动选择复制", true);
            });
        }

        // 显示 Toast 提示
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMessage');
            
            msgEl.innerText = message;
            if (isError) {
                toast.classList.add('bg-rose-600');
                toast.classList.remove('bg-slate-900');
            } else {
                toast.classList.remove('bg-rose-600');
                toast.classList.add('bg-slate-900');
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 2500);
        }

        // 工具函数：转义 HTML 实体
        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // 工具函数：转义 JS 字符串以放入模板字符串中
        function escapeJsString(str) {
            return str.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');
        }

        // 运行页面
        init();
    </script>
</body>
</html>
