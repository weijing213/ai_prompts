<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 常用提示词工具箱</title>
    <!-- 引入 Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 图标库 (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

    <!-- 导航栏 -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-wand-magic-sparkles text-indigo-600 text-2xl"></i>
                <span class="text-xl font-bold text-slate-900">AI 提示词工具箱</span>
            </div>
            <div class="flex items-center space-x-2">
                <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-1">
                    <i class="fa-solid fa-plus"></i> 添加提示词
                </button>
                <button onclick="exportJSON()" class="border border-slate-300 hover:bg-slate-100 text-slate-700 px-3 py-2 rounded-lg text-sm font-medium transition" title="导出备份">
                    <i class="fa-solid fa-download"></i>
                </button>
                <label class="border border-slate-300 hover:bg-slate-100 text-slate-700 px-3 py-2 rounded-lg text-sm font-medium transition cursor-pointer" title="导入备份">
                    <i class="fa-solid fa-upload"></i>
                    <input type="file" id="importFile" accept=".json" class="hidden" onchange="importJSON(event)">
                </label>
            </div>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1 w-full flex flex-col md:flex-row gap-6">
        
        <!-- 左侧分类与搜索 -->
        <aside class="w-full md:w-64 flex-shrink-0 space-y-4">
            <!-- 搜索框 -->
            <div class="relative">
                <input type="text" id="searchInput" oninput="filterPrompts()" placeholder="搜索提示词..." class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3 text-slate-400"></i>
            </div>
            
            <!-- 分类列表 -->
            <div class="bg-white p-4 rounded-xl border border-slate-200">
                <h3 class="font-semibold text-slate-900 mb-3">分类筛选</h3>
                <div id="categoryList" class="space-y-1">
                    <!-- 分类按钮由 JS 动态生成 -->
                </div>
            </div>
        </aside>

        <!-- 右侧卡片展示区域 -->
        <section class="flex-1">
            <div id="promptGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- 提示词卡片由 JS 动态生成 -->
            </div>
            <div id="emptyState" class="hidden text-center py-12">
                <i class="fa-regular fa-folder-open text-slate-300 text-5xl mb-3"></i>
                <p class="text-slate-500">没有找到匹配的提示词</p>
            </div>
        </section>
    </main>

    <!-- 添加/编辑 弹窗 -->
    <div id="promptModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl max-w-lg w-full p-6 shadow-xl relative animate-in fade-in zoom-in-95 duration-200">
            <h3 id="modalTitle" class="text-lg font-bold text-slate-900 mb-4">添加提示词</h3>
            <form id="promptForm" onsubmit="savePrompt(event)" class="space-y-4">
                <input type="hidden" id="promptId">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">标题</label>
                    <input type="text" id="promptTitle" required class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">分类</label>
                    <input type="text" id="promptCategory" required placeholder="例如：翻译、编程、写作" class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">提示词内容</label>
                    <textarea id="promptText" required rows="6" class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 focus:outline-none font-mono text-sm"></textarea>
                </div>
                <div class="flex justify-end space-x-2 pt-2">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 border border-slate-300 rounded-lg text-sm text-slate-700 hover:bg-slate-50">取消</button>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm">确定</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 简易通知提示 -->
    <div id="toast" class="fixed bottom-5 right-5 bg-slate-900 text-white text-sm px-4 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-2">
        <i class="fa-solid fa-circle-check text-emerald-400"></i>
        <span id="toastMessage">操作成功</span>
    </div>

    <!-- JavaScript 逻辑 -->
    <script>
        // 默认初始化数据（若浏览器无本地缓存，则显示此内容）
        const defaultPrompts = [
            { id: 1, title: "中英互译专家", category: "翻译", prompt: "你是一位专业的中英文翻译官。请将以下文本翻译成英文/中文。翻译时要做到信、达、雅，保持原文的语气，避免直译，并在有必要时提供一些词汇解析和背景说明：\n\n[在此输入待翻译文本]" },
            { id: 2, title: "代码 Bug 诊断", category: "编程", prompt: "请作为一名资深软件工程师。分析以下代码中可能存在的 Bug、性能瓶颈或逻辑不严谨的地方，并给出修改建议、优化后的完整代码以及修改原因：\n\n[在此输入代码]" },
            { id: 3, title: "文章结构润色", category: "写作", prompt: "请帮我润色以下段落。在不改变其原本核心意思的前提下，提升文章的语言流畅度、专业感和文学表现力，使其读起来更加生动自然：\n\n[在此输入文本]" }
        ];

        let prompts = JSON.parse(localStorage.getItem('ai_prompts')) || defaultPrompts;
        let selectedCategory = '全部';

        // 初始化页面
        function init() {
            renderCategories();
            renderPrompts();
        }

        // 保存到本地存储
        function persistData() {
            localStorage.setItem('ai_prompts', JSON.stringify(prompts));
        }

        // 渲染分类列表
        function renderCategories() {
            const categories = ['全部', ...new Set(prompts.map(p => p.category))];
            const categoryList = document.getElementById('categoryList');
            categoryList.innerHTML = categories.map(cat => `
                <button onclick="selectCategory('${cat}')" class="w-full text-left px-3 py-2 rounded-lg text-sm transition font-medium flex justify-between items-center ${
                    selectedCategory === cat 
                    ? 'bg-indigo-50 text-indigo-700' 
                    : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'
                }">
                    <span>${cat}</span>
                    <span class="text-xs bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-full">${
                        cat === '全部' ? prompts.length : prompts.filter(p => p.category === cat).length
                    }</span>
                </button>
            `).join('');
        }

        // 选择分类
        function selectCategory(cat) {
            selectedCategory = cat;
            renderCategories();
            renderPrompts();
        }

        // 渲染提示词卡片
        function renderPrompts() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const filtered = prompts.filter(p => {
                const matchesCategory = selectedCategory === '全部' || p.category === selectedCategory;
                const matchesSearch = p.title.toLowerCase().includes(searchQuery) || p.prompt.toLowerCase().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            const grid = document.getElementById('promptGrid');
            const emptyState = document.getElementById('emptyState');

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            grid.innerHTML = filtered.map(p => `
                <div class="bg-white border border-slate-200 rounded-xl p-5 hover:shadow-md transition flex flex-col justify-between group">
                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-semibold bg-indigo-50 text-indigo-700 px-2 py-1 rounded-md">${p.category}</span>
                            <div class="opacity-0 group-hover:opacity-100 transition flex items-center space-x-1">
                                <button onclick="editPrompt(${p.id})" class="p-1 text-slate-400 hover:text-slate-600 rounded" title="编辑">
                                    <i class="fa-regular fa-pen-to-square"></i>
                                </button>
                                <button onclick="deletePrompt(${p.id})" class="p-1 text-slate-400 hover:text-rose-600 rounded" title="删除">
                                    <i class="fa-regular fa-trash-can"></i>
                                </button>
                            </div>
                        </div>
                        <h4 class="font-bold text-slate-900 text-base mb-2">${p.title}</h4>
                        <p class="text-slate-600 text-sm whitespace-pre-wrap break-words line-clamp-6 bg-slate-50 p-3 rounded-lg border border-slate-100 font-mono mb-4">${escapeHtml(p.prompt)}</p>
                    </div>
                    <button onclick="copyToClipboard(this, \`${escapeJsString(p.prompt)}\`)" class="w-full bg-slate-100 hover:bg-indigo-600 hover:text-white text-slate-700 py-2 rounded-lg text-sm font-medium transition flex items-center justify-center gap-1.5">
                        <i class="fa-regular fa-copy"></i> 复制提示词
                    </button>
                </div>
            `).join('');
        }

        // 搜索过滤
        function filterPrompts() {
            renderPrompts();
        }

        // 复制到剪贴板功能
        function copyToClipboard(button, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalContent = button.innerHTML;
                button.innerHTML = `<i class="fa-solid fa-check"></i> 已复制`;
                button.classList.add('bg-emerald-600', 'text-white');
                button.classList.remove('bg-slate-100', 'text-slate-700', 'hover:bg-indigo-600');
                
                showToast("提示词已成功复制到剪切板");

                setTimeout(() => {
                    button.innerHTML = originalContent;
                    button.classList.remove('bg-emerald-600');
                    button.classList.add('bg-slate-100', 'text-slate-700', 'hover:bg-indigo-600');
                }, 1500);
            }).catch(err => {
                showToast("复制失败，请手动选择复制", true);
            });
        }

        // 弹窗控制
        function openModal() {
            document.getElementById('promptId').value = '';
            document.getElementById('promptForm').reset();
            document.getElementById('modalTitle').innerText = '添加提示词';
            document.getElementById('promptModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('promptModal').classList.add('hidden');
        }

        // 编辑提示词
        function editPrompt(id) {
            const prompt = prompts.find(p => p.id === id);
            if (!prompt) return;

            document.getElementById('promptId').value = prompt.id;
            document.getElementById('promptTitle').value = prompt.title;
            document.getElementById('promptCategory').value = prompt.category;
            document.getElementById('promptText').value = prompt.prompt;

            document.getElementById('modalTitle').innerText = '编辑提示词';
            document.getElementById('promptModal').classList.remove('hidden');
        }

        // 新增或更新提示词
        function savePrompt(event) {
            event.preventDefault();
            const idVal = document.getElementById('promptId').value;
            const title = document.getElementById('promptTitle').value.trim();
            const category = document.getElementById('promptCategory').value.trim();
            const promptText = document.getElementById('promptText').value.trim();

            if (idVal) {
                // 编辑现有
                const index = prompts.findIndex(p => p.id == idVal);
                if (index !== -1) {
                    prompts[index] = { id: parseInt(idVal), title, category, prompt: promptText };
                    showToast("更新成功");
                }
            } else {
                // 新增
                const newId = prompts.length > 0 ? Math.max(...prompts.map(p => p.id)) + 1 : 1;
                prompts.push({ id: newId, title, category, prompt: promptText });
                showToast("添加成功");
            }

            persistData();
            closeModal();
            renderCategories();
            renderPrompts();
        }

        // 删除提示词
        function deletePrompt(id) {
            if (confirm("确定要删除这个提示词吗？")) {
                prompts = prompts.filter(p => p.id !== id);
                persistData();
                showToast("删除成功");
                renderCategories();
                // 如果当前分类已被删空，切回全部
                if (selectedCategory !== '全部' && !prompts.some(p => p.category === selectedCategory)) {
                    selectedCategory = '全部';
                }
                renderCategories();
                renderPrompts();
            }
        }

        // 导出 JSON
        function exportJSON() {
            const dataStr = JSON.stringify(prompts, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `ai_prompts_backup_${new Date().toISOString().slice(0, 10)}.json`;
            link.click();
            URL.revokeObjectURL(url);
            showToast("配置已导出为 JSON 文件");
        }

        // 导入 JSON
        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        // 简单格式校验
                        const isValid = imported.every(item => item.title && item.category && item.prompt);
                        if (isValid) {
                            prompts = imported.map((item, idx) => ({
                                id: item.id || idx + 1,
                                title: item.title,
                                category: item.category,
                                prompt: item.prompt
                            }));
                            persistData();
                            init();
                            showToast("数据成功导入并已更新");
                        } else {
                            showToast("格式不合规，确保含有 title, category, prompt 字段", true);
                        }
                    } else {
                        showToast("导入格式错误：应为 JSON 数组", true);
                    }
                } catch (err) {
                    showToast("解析文件失败，请确保文件是合法的 JSON 格式", true);
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // 清理 input 的值
        }

        // 显示 Toast 提示
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMessage');
            
            msgEl.innerText = message;
            if (isError) {
                toast.classList.add('bg-rose-600');
                toast.classList.remove('bg-slate-900');
            } else {
                toast.classList.remove('bg-rose-600');
                toast.classList.add('bg-slate-900');
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 2500);
        }

        // 工具函数：转义 HTML 实体防止页面破坏
        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // 工具函数：转义 JS 字符串以放入模板字符串中
        function escapeJsString(str) {
            return str.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');
        }

        // 运行页面
        init();
    </script>
</body>
</html>
